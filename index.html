<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ippun — KANJI MINUTE</title>
  <meta name="description" content="A 1-minute kanji arcade game for iOS. Tap. Match. Discover." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Zen+Old+Mincho:wght@400;700;900&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:   #0d0d0d;
      --ink:  #f0ebe0;
      --red:  #e8392a;
      --dim:  rgba(240,235,224,0.38);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Shippori Mincho', Georgia, serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 48px 24px;
      position: relative;
      overflow: hidden;
    }

    /* Big ambient kanji in background */
    .bg-kanji {
      position: fixed;
      font-family: 'Zen Old Mincho', serif;
      font-weight: 900;
      font-size: clamp(260px, 40vw, 520px);
      color: rgba(240,235,224,0.028);
      user-select: none;
      pointer-events: none;
      line-height: 1;
      right: -4vw;
      top: 50%;
      transform: translateY(-50%);
      letter-spacing: -0.05em;
      animation: breathe 8s ease-in-out infinite;
    }
    @keyframes breathe {
      0%,100% { opacity: 0.6; }
      50%      { opacity: 1; }
    }

    /* Main container */
    .center {
      position: relative;
      z-index: 1;
      text-align: center;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Minute countdown chip */
    .chip {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      border: 1px solid rgba(240,235,224,0.15);
      border-radius: 999px;
      padding: 6px 14px;
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 40px;
      animation: fadeIn 0.6s ease both;
    }
    .chip-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--red);
      animation: pulse 1.4s ease-in-out infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.5; transform: scale(0.7); }
    }

    /* App name */
    h1 {
      font-family: 'Zen Old Mincho', serif;
      font-weight: 900;
      font-size: clamp(48px, 12vw, 88px);
      letter-spacing: -0.02em;
      line-height: 0.95;
      margin-bottom: 6px;
      animation: fadeIn 0.6s 0.1s ease both;
    }
    h1 span { color: var(--red); }

    .subtitle {
      font-size: 11px;
      letter-spacing: 0.28em;
      text-transform: uppercase;
      color: var(--dim);
      margin-bottom: 52px;
      animation: fadeIn 0.6s 0.2s ease both;
    }

    /* Kanji tiles demo */
    .tiles {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      animation: fadeIn 0.6s 0.3s ease both;
    }
    .tile {
      width: 64px;
      height: 64px;
      border: 1px solid rgba(240,235,224,0.12);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Zen Old Mincho', serif;
      font-size: 30px;
      font-weight: 700;
      color: var(--ink);
      background: rgba(240,235,224,0.04);
      cursor: default;
      transition: background 0.15s, border-color 0.15s, transform 0.15s;
    }
    .tile.lit {
      background: rgba(232,57,42,0.15);
      border-color: var(--red);
      color: #fff;
      transform: scale(1.06);
    }

    .compound-hint {
      font-size: 12px;
      letter-spacing: 0.12em;
      color: var(--dim);
      margin-bottom: 56px;
      height: 18px;
      animation: fadeIn 0.6s 0.35s ease both;
    }
    .compound-hint span {
      color: rgba(232,57,42,0.8);
      font-weight: 600;
    }

    /* App Store button */
    .appstore {
      display: inline-flex;
      align-items: center;
      gap: 11px;
      background: var(--ink);
      color: var(--bg);
      padding: 13px 26px;
      border-radius: 10px;
      text-decoration: none;
      transition: opacity 0.15s, transform 0.15s;
      animation: fadeIn 0.6s 0.45s ease both;
    }
    .appstore:hover { opacity: 0.88; transform: translateY(-2px); }
    .appstore-text { display: flex; flex-direction: column; line-height: 1.2; text-align: left; }
    .appstore-text small {
      font-size: 9.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      opacity: 0.55;
    }
    .appstore-text strong {
      font-family: 'Zen Old Mincho', serif;
      font-size: 16px;
      font-weight: 700;
    }

    /* Footer */
    footer {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 18px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 10.5px;
      letter-spacing: 0.1em;
      color: rgba(240,235,224,0.2);
      z-index: 2;
    }
    footer a {
      color: inherit;
      text-decoration: none;
      transition: color 0.15s;
    }
    footer a:hover { color: rgba(240,235,224,0.55); }
    footer nav { display: flex; gap: 24px; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 400px) {
      .tile { width: 54px; height: 54px; font-size: 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-kanji">漢字</div>

  <div class="center">

    <div class="chip">
      <div class="chip-dot"></div>
      1 minute arcade
    </div>

    <h1>ipp<span>u</span>n</h1>
    <p class="subtitle">一分 · Kanji Minute</p>

    <!-- Animated tile demo -->
    <div class="tiles">
      <div class="tile" id="t0">火</div>
      <div class="tile" id="t1">山</div>
      <div class="tile" id="t2">水</div>
      <div class="tile" id="t3">口</div>
    </div>
    <p class="compound-hint" id="hint">&nbsp;</p>

    <a href="https://apps.apple.com" class="appstore">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="currentColor">
        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98l-.09.06c-.22.15-2.22 1.3-2.2 3.88.04 3.06 2.69 4.08 2.72 4.09-.03.07-.42 1.44-1.37 2.61M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
      </svg>
      <div class="appstore-text">
        <small>Download on the</small>
        <strong>App Store</strong>
      </div>
    </a>

  </div>

  <footer>
    <span>&copy; 2025 ippun</span>
    <nav>
      <a href="privacy.html">Privacy</a>
      <a href="support.html">Support</a>
    </nav>
  </footer>

  <script>
    // Tile tap animation loop hinting at compound matching
    const sequences = [
      { tiles: [0, 1], compound: '火山　·　volcano' },
      { tiles: [2, 3], compound: '水口　·　water inlet' },
      { tiles: [1, 2], compound: '山水　·　landscape' },
    ];
    const tiles = document.querySelectorAll('.tile');
    const hint  = document.getElementById('hint');
    let seq = 0;

    function runSeq() {
      const { tiles: idx, compound } = sequences[seq % sequences.length];
      tiles[idx[0]].classList.add('lit');
      setTimeout(() => {
        tiles[idx[1]].classList.add('lit');
        hint.innerHTML = `<span>${compound}</span>`;
      }, 500);
      setTimeout(() => {
        tiles.forEach(t => t.classList.remove('lit'));
        hint.innerHTML = '&nbsp;';
        seq++;
        setTimeout(runSeq, 700);
      }, 2000);
    }

    setTimeout(runSeq, 1200);
  </script>

</body>
</html>
